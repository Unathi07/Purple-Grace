<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Purple Grace Store</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <nav>
        <a href="/" class="logo">💜 Purple Grace</a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/static/cart.html">🛒 Cart</a>
        </div>
    </nav>

    <div class="auth-container">
        <div id="message"></div>

        <!-- Login Form -->
        <div id="login-form">
            <h2>Login</h2>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="login-email" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="••••••••">
            </div>
            <button class="btn btn-primary" onclick="login()">Login</button>
            <div class="auth-switch">
                Don't have an account? <a onclick="showRegister()">Register</a>
            </div>
        </div>

        <!-- Register Form -->
        <div id="register-form" style="display:none">
            <h2>Create Account</h2>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="register-email" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="register-password" placeholder="••••••••">
            </div>
            <button class="btn btn-primary" onclick="register()">Create Account</button>
            <div class="auth-switch">
                Already have an account? <a onclick="showLogin()">Login</a>
            </div>
        </div>
    </div>

    <script>
        const API = "http://127.0.0.1:8000"

        // Redirect if already logged in
        if (localStorage.getItem("token")) {
            window.location.href = "/"
        }

        function showRegister() {
            document.getElementById("login-form").style.display = "none"
            document.getElementById("register-form").style.display = "block"
        }

        function showLogin() {
            document.getElementById("register-form").style.display = "none"
            document.getElementById("login-form").style.display = "block"
        }

        async function login() {
            const email = document.getElementById("login-email").value
            const password = document.getElementById("login-password").value

            const response = await fetch(`${API}/login`, {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: `username=${email}&password=${password}`
            })

            if (response.ok) {
                const data = await response.json()
                localStorage.setItem("token", data.access_token)
                window.location.href = "/"
            } else {
                showMessage("Incorrect email or password", "error")
            }
        }

        async function register() {
            const email = document.getElementById("register-email").value
            const password = document.getElementById("register-password").value

            const response = await fetch(`${API}/register`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password })
            })

            if (response.ok) {
                showMessage("Account created! Logging you in...", "success")
                setTimeout(() => login(), 1000)
            } else {
                const data = await response.json()
                showMessage(data.detail || "Registration failed", "error")
            }
        }

        function showMessage(text, type) {
            const msg = document.getElementById("message")
            msg.innerHTML = `<div class="message ${type}">${text}</div>`
        }
    </script>
</body>
</html>
