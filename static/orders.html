<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders — Purple Grace Store</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav>
    <a href="/" class="logo">💜 Purple Grace</a>
    <button class="hamburger" onclick="toggleMenu()" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
    </button>
    <div class="nav-links" id="nav-links">
        <a href="/">Home</a>
        <a href="/static/cart.html">🛒 Cart</a>
        <a href="/static/orders.html">📦 Orders</a>
        <a href="/static/auth.html" id="auth-link">Login</a>
        <a href="#" id="logout-link" style="display:none">Logout</a>
    </div>
</nav>

    <div class="container">
        <div id="message"></div>
        <p class="section-title">My Orders</p>
        <div id="orders-list"></div>
    </div>

    <script>
        const API = "http://127.0.0.1:8000"
        const token = localStorage.getItem("token")

        // Redirect if not logged in
        if (!token) {
            window.location.href = "/static/auth.html"
        }

        if (token) {
            document.getElementById("auth-link").style.display = "none"
            document.getElementById("logout-link").style.display = "inline"
        }

        document.getElementById("logout-link").onclick = () => {
            localStorage.removeItem("token")
            window.location.href = "/"
        }

        async function loadOrders() {
            const response = await fetch(`${API}/orders`, {
                headers: { "Authorization": `Bearer ${token}` }
            })
            const orders = await response.json()
            const container = document.getElementById("orders-list")

            if (orders.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p>You haven't placed any orders yet</p>
                        <a href="/" class="btn btn-primary"
                            style="display:inline-block;width:auto;text-decoration:none">
                            Start Shopping
                        </a>
                    </div>`
                return
            }

            container.innerHTML = orders.map(order => `
                <div class="cart-item" style="flex-direction:column;align-items:flex-start;gap:1rem">
                    <div style="display:flex;justify-content:space-between;width:100%;align-items:center">
                        <div>
                            <h3>Order #${order.id}</h3>
                            <p style="color:#888;font-size:0.85rem">
                                Placed on ${new Date(order.created_at).toLocaleDateString()}
                            </p>
                        </div>
                        <span style="
                            background:${order.status === 'pending' ? '#fef3c7' : '#d1fae5'};
                            color:${order.status === 'pending' ? '#92400e' : '#065f46'};
                            padding:0.3rem 0.75rem;
                            border-radius:99px;
                            font-size:0.8rem;
                            font-weight:bold;
                            text-transform:capitalize
                        ">${order.status}</span>
                    </div>
                    <div style="width:100%">
                        ${order.items.map(item => `
                            <div style="display:flex;justify-content:space-between;
                                padding:0.5rem 0;border-bottom:1px solid #f3f4f6">
                                <span>Product #${item.product_id} × ${item.quantity}</span>
                                <span style="font-weight:bold;color:#6b21a8">
                                    R${(item.price * item.quantity).toFixed(2)}
                                </span>
                            </div>
                        `).join("")}
                    </div>
                    <div style="width:100%;text-align:right;font-weight:bold;font-size:1.1rem;color:#6b21a8">
                        Total: R${order.items.reduce((sum, item) =>
                            sum + (item.price * item.quantity), 0).toFixed(2)}
                    </div>
                </div>
            `).join("")
        }

        function toggleMenu() {
    const links = document.getElementById("nav-links")
    links.classList.toggle("open")
}

        loadOrders()
    </script>
</body>
</html>
