<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Purple Grace Store</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .admin-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }

        .admin-panel {
            background: white;
            border-radius: 8px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .admin-panel h2 {
            color: #6b21a8;
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
        }

        .product-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0;
            border-bottom: 1px solid #f3f4f6;
        }

        .product-row:last-child {
            border-bottom: none;
        }

        .product-row .info h4 {
            font-size: 0.95rem;
            margin-bottom: 0.2rem;
        }

        .product-row .info p {
            font-size: 0.8rem;
            color: #888;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
            padding: 0.3rem 0.75rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        @media (max-width: 768px) {
            .admin-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="logo">💜 Purple Grace</a>
        <div class="nav-links">
            <a href="/">Store</a>
            <a href="#" id="logout-link">Logout</a>
        </div>
    </nav>

    <!-- Login Screen -->
    <div id="login-screen">
        <div class="auth-container">
            <h2>Admin Login</h2>
            <div id="message"></div>
            <div class="form-group">
                <label>Admin Password</label>
                <input type="password" id="admin-password" placeholder="••••••••">
            </div>
            <button class="btn btn-primary" onclick="adminLogin()">Login</button>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="dashboard" style="display:none">
        <div class="container">
            <div class="admin-grid">

                <!-- Add Product -->
                <div class="admin-panel">
                    <h2>➕ Add New Product</h2>
                    <div id="add-message"></div>
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" id="new-name" placeholder="Product name">
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <input type="text" id="new-description" placeholder="Optional description">
                    </div>
                    <div class="form-group">
                        <label>Price (R)</label>
                        <input type="number" id="new-price" placeholder="0.00" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>Stock</label>
                        <input type="number" id="new-stock" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <input type="text" id="new-category" placeholder="e.g. candles, soap">
                    </div>
                    <div class="form-group">
                        <label>Product Image</label>
                        <input type="file" id="new-image" accept="image/*">
                    </div>
                    <button class="btn btn-primary" onclick="addProduct()">Add Product</button>
                </div>

                <!-- Product List -->
                <div class="admin-panel">
                    <h2>📦 All Products</h2>
                    <div id="product-list">Loading...</div>
                </div>

            </div>
        </div>
    </div>

    <script>
        const API = "http://127.0.0.1:8000"
        let adminPassword = ""

        // Check if already logged in
        if (sessionStorage.getItem("adminPassword")) {
            adminPassword = sessionStorage.getItem("adminPassword")
            showDashboard()
        }

        document.getElementById("logout-link").onclick = () => {
            sessionStorage.removeItem("adminPassword")
            window.location.reload()
        }

        async function adminLogin() {
            const password = document.getElementById("admin-password").value
            const response = await fetch(`${API}/admin/login?password=${password}`, {
                method: "POST"
            })
            if (response.ok) {
                adminPassword = password
                sessionStorage.setItem("adminPassword", password)
                showDashboard()
            } else {
                document.getElementById("message").innerHTML =
                    `<div class="message error">Invalid password</div>`
            }
        }

        function showDashboard() {
            document.getElementById("login-screen").style.display = "none"
            document.getElementById("dashboard").style.display = "block"
            loadProducts()
        }

        async function loadProducts() {
            const response = await fetch(`${API}/admin/products?password=${adminPassword}`)
            const products = await response.json()
            const list = document.getElementById("product-list")

            if (products.length === 0) {
                list.innerHTML = `<p style="color:#888">No products yet</p>`
                return
            }

            list.innerHTML = products.map(p => `
                <div class="product-row">
                    <div class="info">
                        <h4>${p.name}</h4>
                        <p>R${p.price.toFixed(2)} · Stock: ${p.stock} · ${p.category || "No category"}</p>
                    </div>
                    <button class="btn-danger" onclick="deleteProduct(${p.id})">Delete</button>
                </div>
            `).join("")
        }

        async function addProduct() {
            const name = document.getElementById("new-name").value
            const description = document.getElementById("new-description").value
            const price = parseFloat(document.getElementById("new-price").value)
            const stock = parseInt(document.getElementById("new-stock").value)
            const category = document.getElementById("new-category").value
            const imageFile = document.getElementById("new-image").files[0]

            if (!name || !price || !stock) {
                document.getElementById("add-message").innerHTML =
                    `<div class="message error">Name, price and stock are required</div>`
                return
            }

            // Upload image first if provided
            let image_url = null
            if (imageFile) {
                const formData = new FormData()
                formData.append("file", imageFile)
                const uploadRes = await fetch(`${API}/products/upload-image`, {
                    method: "POST",
                    body: formData
                })
                const uploadData = await uploadRes.json()
                image_url = uploadData.image_url
            }

            // Create the product
            const response = await fetch(`${API}/products`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name, description, price, stock, category, image_url })
            })

            if (response.ok) {
                document.getElementById("add-message").innerHTML =
                    `<div class="message success">Product added! ✅</div>`
                // Clear the form
                document.getElementById("new-name").value = ""
                document.getElementById("new-description").value = ""
                document.getElementById("new-price").value = ""
                document.getElementById("new-stock").value = ""
                document.getElementById("new-category").value = ""
                document.getElementById("new-image").value = ""
                loadProducts()
                setTimeout(() => {
                    document.getElementById("add-message").innerHTML = ""
                }, 3000)
            } else {
                document.getElementById("add-message").innerHTML =
                    `<div class="message error">Failed to add product</div>`
            }
        }

        async function deleteProduct(productId) {
            if (!confirm("Are you sure you want to delete this product?")) return

            const response = await fetch(
                `${API}/admin/products/${productId}?password=${adminPassword}`,
                { method: "DELETE" }
            )
            if (response.ok) {
                loadProducts()
            }
        }

        // Login on Enter key
        document.getElementById("admin-password") &&
            document.getElementById("admin-password").addEventListener("keypress", (e) => {
                if (e.key === "Enter") adminLogin()
            })
    </script>
</body>
</html>
